services:
  - type: web
    name: vascular-exam
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: DATA_DIR
        value: /tmp
    healthCheckPath: /health
    autoDeploy: true
